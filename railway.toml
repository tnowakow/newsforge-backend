# Railway service config — single service "api".
# release runs migrations + idempotent seed on every deploy (Vitaly §4).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node apps/api/dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# NOTE: migrations + seed run during build (nixpacks.toml) since runtime lacks npm.
