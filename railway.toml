# Railway service config — single service "api".
# Dockerfile handles migrations + seed at container startup (via CMD).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'npx prisma migrate deploy --schema prisma/schema.prisma && npx tsx prisma/seed.ts && node apps/api/dist/index.js'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 120
