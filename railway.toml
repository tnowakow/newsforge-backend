# Railway service config — single service "api".
# release runs migrations + idempotent seed on every deploy (Vitaly §4).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node apps/api/dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Vitaly: release command runs migrations then idempotent seed.
[deploy.releaseCommand]
command = "npx prisma migrate deploy --schema prisma/schema.prisma && npx tsx prisma/seed.ts"
